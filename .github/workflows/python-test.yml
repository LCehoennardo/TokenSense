name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Lint with flake8
      run: |
        flake8 src/refresh_token_data.py --max-line-length=120 --ignore=E501,W503

    - name: Syntax check
      run: |
        python -m py_compile src/refresh_token_data.py
        python -m py_compile src/app.js 2>/dev/null || true